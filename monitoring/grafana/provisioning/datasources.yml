apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: PostgreSQL
    type: postgres
    url: postgres:5432
    database: postgres
    user: supabase_admin
    secureJsonData:
      password: $POSTGRES_PASSWORD
    jsonData:
      sslmode: require
      maxOpenConns: 5
      postgresVersion: 1500
