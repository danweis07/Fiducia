global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: "banking-platform"
    metrics_path: /metrics
    static_configs:
      - targets: ["banking-platform:80"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: "supabase-gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["supabase-gateway:54321"]

  - job_name: "nginx"
    static_configs:
      - targets: ["nginx-exporter:9113"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
