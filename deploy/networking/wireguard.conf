# =============================================================================
# WireGuard Configuration — Private Tunnel to Core Banking Network
# =============================================================================
# For institutions that prefer raw WireGuard over Tailscale.
#
# Usage:
#   1. Generate keys: wg genkey | tee privatekey | wg pubkey > publickey
#   2. Exchange public keys with the institution's network team
#   3. Fill in the values below
#   4. Mount this config and run: wg-quick up /etc/wireguard/wg0.conf
#
# In Docker, use the WireGuard sidecar pattern (see docker-compose.wireguard.yml)

[Interface]
# Banking platform side
Address = 10.100.0.2/32
# Private key — NEVER commit this. Load from Vault / AWS Secrets Manager.
# PrivateKey = <LOAD_FROM_SECRETS_MANAGER>
ListenPort = 51820
DNS = 10.100.0.1

# Keep NAT mappings alive (required for most cloud environments)
PersistentKeepalive = 25

[Peer]
# Institution's core banking gateway
# PublicKey = <INSTITUTION_PUBLIC_KEY>
# Endpoint = core-gateway.institution.internal:51820
AllowedIPs = 10.200.0.0/16
# Route only core banking traffic through the tunnel — split tunneling
# This ensures only Fineract/Symitar/CU*Answers traffic goes through VPN
