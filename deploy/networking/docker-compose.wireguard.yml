# =============================================================================
# Docker Compose — WireGuard Sidecar for Private Core Banking Connectivity
# =============================================================================
# Alternative to Tailscale for institutions that prefer raw WireGuard tunnels.
#
# Usage:
#   1. Configure deploy/networking/wireguard.conf with institution-provided values
#   2. Store the WireGuard private key in your secrets manager
#   3. docker compose -f docker-compose.yml -f deploy/networking/docker-compose.wireguard.yml up

services:
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    volumes:
      - ./deploy/networking/wireguard.conf:/etc/wireguard/wg0.conf:ro
      - /lib/modules:/lib/modules:ro
    environment:
      - PUID=1000
      - PGID=1000
    ports:
      - "51820:51820/udp"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wg", "show", "wg0"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Override the app service to route core-banking traffic through WireGuard
  app:
    network_mode: "service:wireguard"
    depends_on:
      wireguard:
        condition: service_healthy

volumes:
  wireguard-config:
