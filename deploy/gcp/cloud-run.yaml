apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: open-banking-platform
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/description: >
      Open Banking Platform - Multi-tenant digital banking frontend.
      Serves the React SPA from an nginx container.
      Backend (Supabase) should be configured separately.
spec:
  template:
    metadata:
      annotations:
        # Scale to zero when idle
        autoscaling.knative.dev/minScale: '0'
        autoscaling.knative.dev/maxScale: '10'
        # Maximum request timeout
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: gcr.io/PROJECT_ID/open-banking-platform:latest
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              memory: 512Mi
              cpu: '1'
          env:
            - name: VITE_SUPABASE_URL
              value: 'https://your-project.supabase.co'
            - name: VITE_SUPABASE_ANON_KEY
              value: 'your-anon-key'
            - name: NODE_ENV
              value: 'production'
          startupProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 3
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 15

  traffic:
    - percent: 100
      latestRevision: true

# ---------------------------------------------------------------
# Deployment steps:
#
#   1. Build the Docker image:
#      docker build -t gcr.io/PROJECT_ID/open-banking-platform .
#
#   2. Push to Container Registry:
#      docker push gcr.io/PROJECT_ID/open-banking-platform
#
#   3. Deploy to Cloud Run:
#      gcloud run services replace deploy/gcp/cloud-run.yaml \
#        --region us-central1
#
#   4. Allow unauthenticated access (public website):
#      gcloud run services add-iam-policy-binding open-banking-platform \
#        --region us-central1 \
#        --member="allUsers" \
#        --role="roles/run.invoker"
#
# Environment variables:
#   Replace VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY with your
#   Supabase project credentials. For production, use Secret Manager:
#
#   gcloud run services update open-banking-platform \
#     --set-secrets="VITE_SUPABASE_ANON_KEY=supabase-anon-key:latest"
# ---------------------------------------------------------------
