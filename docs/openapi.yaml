openapi: 3.1.0
info:
  title: Open Banking Platform — Gateway API
  version: 1.0.0
  description: |
    Multi-tenant digital banking gateway API for vendor integrators.

    All requests go through a single gateway endpoint. The `action` field in the
    request body determines which handler is invoked. Responses follow a
    consistent envelope: `{ data, error, meta }`.

    ## Authentication
    All authenticated endpoints require a valid Supabase JWT in the
    `Authorization: Bearer <token>` header. Public endpoints (CMS public
    content, system health) do not require authentication.

    ## Multi-Tenancy
    Tenant isolation is automatic — the JWT encodes the tenant context.
    All queries are scoped by `tenant_id` + `auth.uid()`.

    ## Monetary Values
    All monetary amounts are expressed in **integer cents** (e.g. `5000` = $50.00).
    Never use floating-point dollar values.

    ## Error Codes
    | Code | Meaning |
    |------|---------|
    | `UNAUTHORIZED` | Missing or invalid JWT |
    | `FORBIDDEN` | Insufficient permissions |
    | `NOT_FOUND` | Resource does not exist |
    | `VALIDATION_ERROR` | Invalid input parameters |
    | `RATE_LIMITED` | Too many requests |
    | `INTERNAL_ERROR` | Server error |

  contact:
    name: Open Banking Platform Contributors
  license:
    name: MIT

servers:
  - url: https://{tenant}.supabase.co/functions/v1/gateway
    description: Production gateway (per-tenant Supabase project)
    variables:
      tenant:
        default: your-project-ref
        description: Supabase project reference

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # =========================================================================
    # ENVELOPE
    # =========================================================================
    GatewayRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          description: The route action to invoke (e.g. `accounts.list`)
        params:
          type: object
          description: Action-specific parameters

    GatewayResponse:
      type: object
      properties:
        data:
          description: Action-specific response payload
        error:
          $ref: '#/components/schemas/GatewayError'
        meta:
          type: object
          properties:
            pagination:
              $ref: '#/components/schemas/Pagination'

    GatewayError:
      type: object
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Invalid account ID

    Pagination:
      type: object
      properties:
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        hasMore:
          type: boolean

    # =========================================================================
    # BANKING DOMAIN
    # =========================================================================
    Account:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [checking, savings, cd, moneyMarket]
        name:
          type: string
        balanceCents:
          type: integer
          description: Current balance in cents
        availableBalanceCents:
          type: integer
        status:
          type: string
          enum: [active, closed, frozen, dormant]
        mask:
          type: string
          description: Masked account number (e.g. ****1234)
        openedAt:
          type: string
          format: date-time

    Transaction:
      type: object
      properties:
        id:
          type: string
        accountId:
          type: string
        amountCents:
          type: integer
          description: Negative for debits, positive for credits
        description:
          type: string
        category:
          type: string
        type:
          type: string
          enum: [debit, credit, transfer, fee, interest, dividend]
        status:
          type: string
          enum: [posted, pending, cancelled]
        date:
          type: string
          format: date
        runningBalanceCents:
          type: integer

    Transfer:
      type: object
      properties:
        id:
          type: string
        fromAccountId:
          type: string
        toAccountId:
          type: string
        amountCents:
          type: integer
        type:
          type: string
          enum: [internal, external, wire]
        status:
          type: string
          enum: [pending, completed, cancelled, failed]
        memo:
          type: string
        scheduledDate:
          type: string
          format: date
        createdAt:
          type: string
          format: date-time

    Beneficiary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        nickname:
          type: string
        accountNumberMasked:
          type: string
        routingNumber:
          type: string
        bankName:
          type: string
        type:
          type: string
          enum: [ach, wire, internal]

    Card:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [debit, credit]
        status:
          type: string
          enum: [active, locked, cancelled, expired]
        lastFour:
          type: string
        expirationDate:
          type: string
        dailyLimitCents:
          type: integer

    Bill:
      type: object
      properties:
        id:
          type: string
        payeeName:
          type: string
        amountCents:
          type: integer
        dueDate:
          type: string
          format: date
        status:
          type: string
          enum: [pending, paid, overdue, cancelled]

    RDCDeposit:
      type: object
      properties:
        id:
          type: string
        accountId:
          type: string
        amountCents:
          type: integer
        status:
          type: string
          enum: [processing, accepted, rejected]
        checkNumber:
          type: string
        createdAt:
          type: string
          format: date-time

    Notification:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        body:
          type: string
        type:
          type: string
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time

    Loan:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        principalCents:
          type: integer
        balanceCents:
          type: integer
        interestRate:
          type: number
        status:
          type: string
          enum: [active, paid_off, delinquent, defaulted]
        nextPaymentDate:
          type: string
          format: date
        nextPaymentAmountCents:
          type: integer

    SavingsGoal:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        targetAmountCents:
          type: integer
        currentAmountCents:
          type: integer
        targetDate:
          type: string
          format: date
        status:
          type: string

    WireTransfer:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [domestic, international]
        amountCents:
          type: integer
        status:
          type: string
        createdAt:
          type: string
          format: date-time

    StopPayment:
      type: object
      properties:
        id:
          type: string
        accountId:
          type: string
        checkNumber:
          type: string
        amountCents:
          type: integer
        status:
          type: string
        expiresAt:
          type: string
          format: date-time

    Dispute:
      type: object
      properties:
        id:
          type: string
        transactionId:
          type: string
        amountCents:
          type: integer
        reason:
          type: string
        status:
          type: string
          enum: [open, under_review, provisional_credit, resolved, denied]
        filedAt:
          type: string
          format: date-time

    BankingCapabilities:
      type: object
      description: Backend-driven feature flags for the tenant
      properties:
        transfersEnabled:
          type: boolean
        billPayEnabled:
          type: boolean
        rdcEnabled:
          type: boolean
        p2pEnabled:
          type: boolean
        wireTransfersEnabled:
          type: boolean
        cardOffersEnabled:
          type: boolean

    TenantTheme:
      type: object
      properties:
        primaryColor:
          type: string
        logoUrl:
          type: string
        institutionName:
          type: string

# =============================================================================
# PATHS — organized by domain
# =============================================================================
paths:
  /gateway:
    post:
      summary: Gateway dispatch endpoint
      description: |
        Single entry point for all API operations. The `action` field in the
        request body determines which handler processes the request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GatewayRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '429':
          description: Rate limited

  # ===========================================================================
  # ACCOUNTS
  # ===========================================================================
  /gateway#accounts.list:
    post:
      tags: [Accounts]
      summary: List all accounts
      description: Returns all accounts for the authenticated member.
      operationId: accounts.list
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  example: accounts.list
      responses:
        '200':
          description: Account list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      accounts:
                        type: array
                        items:
                          $ref: '#/components/schemas/Account'

  /gateway#accounts.get:
    post:
      tags: [Accounts]
      summary: Get single account
      operationId: accounts.get
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [action, params]
              properties:
                action:
                  type: string
                  example: accounts.get
                params:
                  type: object
                  required: [id]
                  properties:
                    id:
                      type: string
      responses:
        '200':
          description: Account detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      account:
                        $ref: '#/components/schemas/Account'

  /gateway#accounts.summary:
    post:
      tags: [Accounts]
      summary: Get account summary (totals)
      operationId: accounts.summary
      responses:
        '200':
          description: Summary with total balances and account count
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      totalBalanceCents:
                        type: integer
                      totalAvailableCents:
                        type: integer
                      accountCount:
                        type: integer

  # ===========================================================================
  # TRANSACTIONS
  # ===========================================================================
  /gateway#transactions.list:
    post:
      tags: [Transactions]
      summary: List transactions
      operationId: transactions.list
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  example: transactions.list
                params:
                  type: object
                  properties:
                    accountId:
                      type: string
                    type:
                      type: string
                    status:
                      type: string
                    category:
                      type: string
                    fromDate:
                      type: string
                      format: date
                    toDate:
                      type: string
                      format: date
                    search:
                      type: string
                    limit:
                      type: integer
                      default: 20
                    offset:
                      type: integer
                      default: 0
      responses:
        '200':
          description: Paginated transaction list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      transactions:
                        type: array
                        items:
                          $ref: '#/components/schemas/Transaction'

  /gateway#transactions.get:
    post:
      tags: [Transactions]
      summary: Get single transaction
      operationId: transactions.get
      responses:
        '200':
          description: Transaction detail

  /gateway#transactions.search:
    post:
      tags: [Transactions]
      summary: Search transactions
      operationId: transactions.search
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                params:
                  type: object
                  required: [query]
                  properties:
                    query:
                      type: string
                    accountId:
                      type: string
                    limit:
                      type: integer
      responses:
        '200':
          description: Search results

  # ===========================================================================
  # TRANSFERS
  # ===========================================================================
  /gateway#transfers.create:
    post:
      tags: [Transfers]
      summary: Create a transfer
      operationId: transfers.create
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                params:
                  type: object
                  required: [fromAccountId, type, amountCents]
                  properties:
                    fromAccountId:
                      type: string
                    toAccountId:
                      type: string
                    toBeneficiaryId:
                      type: string
                    type:
                      type: string
                      enum: [internal, external]
                    amountCents:
                      type: integer
                    memo:
                      type: string
      responses:
        '200':
          description: Created transfer

  /gateway#transfers.schedule:
    post:
      tags: [Transfers]
      summary: Schedule a future or recurring transfer
      operationId: transfers.schedule
      responses:
        '200':
          description: Scheduled transfer

  /gateway#transfers.cancel:
    post:
      tags: [Transfers]
      summary: Cancel a pending transfer
      operationId: transfers.cancel
      responses:
        '200':
          description: Cancellation result

  /gateway#transfers.list:
    post:
      tags: [Transfers]
      summary: List transfers
      operationId: transfers.list
      responses:
        '200':
          description: Paginated transfer list

  # ===========================================================================
  # BENEFICIARIES
  # ===========================================================================
  /gateway#beneficiaries.list:
    post:
      tags: [Beneficiaries]
      summary: List beneficiaries
      operationId: beneficiaries.list
      responses:
        '200':
          description: Beneficiary list

  /gateway#beneficiaries.create:
    post:
      tags: [Beneficiaries]
      summary: Create a beneficiary
      operationId: beneficiaries.create
      responses:
        '200':
          description: Created beneficiary

  /gateway#beneficiaries.delete:
    post:
      tags: [Beneficiaries]
      summary: Delete a beneficiary
      operationId: beneficiaries.delete
      responses:
        '200':
          description: Deletion result

  # ===========================================================================
  # CARDS
  # ===========================================================================
  /gateway#cards.list:
    post:
      tags: [Cards]
      summary: List cards
      operationId: cards.list
      responses:
        '200':
          description: Card list

  /gateway#cards.lock:
    post:
      tags: [Cards]
      summary: Lock a card
      operationId: cards.lock
      responses:
        '200':
          description: Locked card

  /gateway#cards.unlock:
    post:
      tags: [Cards]
      summary: Unlock a card
      operationId: cards.unlock
      responses:
        '200':
          description: Unlocked card

  /gateway#cards.setLimit:
    post:
      tags: [Cards]
      summary: Set daily spending limit
      operationId: cards.setLimit
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                params:
                  type: object
                  required: [id, dailyLimitCents]
                  properties:
                    id:
                      type: string
                    dailyLimitCents:
                      type: integer
      responses:
        '200':
          description: Updated card

  # ===========================================================================
  # BILLS
  # ===========================================================================
  /gateway#bills.list:
    post:
      tags: [Bills]
      summary: List bills
      operationId: bills.list
      responses:
        '200':
          description: Bill list

  /gateway#bills.create:
    post:
      tags: [Bills]
      summary: Create a bill payment
      operationId: bills.create
      responses:
        '200':
          description: Created bill

  /gateway#bills.pay:
    post:
      tags: [Bills]
      summary: Pay a bill
      operationId: bills.pay
      responses:
        '200':
          description: Paid bill

  /gateway#bills.cancel:
    post:
      tags: [Bills]
      summary: Cancel a bill
      operationId: bills.cancel
      responses:
        '200':
          description: Cancellation result

  # ===========================================================================
  # RDC (Remote Deposit Capture)
  # ===========================================================================
  /gateway#rdc.deposit:
    post:
      tags: [RDC]
      summary: Submit a check deposit
      operationId: rdc.deposit
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                params:
                  type: object
                  required: [accountId, amountCents, frontImageBase64, backImageBase64]
                  properties:
                    accountId:
                      type: string
                    amountCents:
                      type: integer
                    frontImageBase64:
                      type: string
                      format: byte
                    backImageBase64:
                      type: string
                      format: byte
                    checkNumber:
                      type: string
      responses:
        '200':
          description: Deposit submission result

  /gateway#rdc.status:
    post:
      tags: [RDC]
      summary: Get deposit status
      operationId: rdc.status
      responses:
        '200':
          description: Deposit status

  /gateway#rdc.history:
    post:
      tags: [RDC]
      summary: List deposit history
      operationId: rdc.history
      responses:
        '200':
          description: Deposit history

  # ===========================================================================
  # NOTIFICATIONS
  # ===========================================================================
  /gateway#notifications.list:
    post:
      tags: [Notifications]
      summary: List notifications
      operationId: notifications.list
      responses:
        '200':
          description: Notification list

  /gateway#notifications.markRead:
    post:
      tags: [Notifications]
      summary: Mark notification as read
      operationId: notifications.markRead
      responses:
        '200':
          description: Success

  /gateway#notifications.markAllRead:
    post:
      tags: [Notifications]
      summary: Mark all notifications read
      operationId: notifications.markAllRead
      responses:
        '200':
          description: Success

  /gateway#notifications.unreadCount:
    post:
      tags: [Notifications]
      summary: Get unread notification count
      operationId: notifications.unreadCount
      responses:
        '200':
          description: Unread count

  /gateway#notifications.preferences.get:
    post:
      tags: [Notifications]
      summary: Get notification preferences
      operationId: notifications.preferences.get
      responses:
        '200':
          description: Preferences

  /gateway#notifications.preferences.update:
    post:
      tags: [Notifications]
      summary: Update notification preferences
      operationId: notifications.preferences.update
      responses:
        '200':
          description: Updated preferences

  # ===========================================================================
  # STATEMENTS
  # ===========================================================================
  /gateway#statements.list:
    post:
      tags: [Statements]
      summary: List statements for an account
      operationId: statements.list
      responses:
        '200':
          description: Statement list

  /gateway#statements.get:
    post:
      tags: [Statements]
      summary: Get statement detail
      operationId: statements.get
      responses:
        '200':
          description: Statement detail

  /gateway#statements.download:
    post:
      tags: [Statements]
      summary: Download statement PDF
      operationId: statements.download
      responses:
        '200':
          description: Pre-signed download URL

  # ===========================================================================
  # LOANS
  # ===========================================================================
  /gateway#loans.list:
    post:
      tags: [Loans]
      summary: List loans
      operationId: loans.list
      responses:
        '200':
          description: Loan list

  /gateway#loans.get:
    post:
      tags: [Loans]
      summary: Get loan detail
      operationId: loans.get
      responses:
        '200':
          description: Loan detail

  /gateway#loans.schedule:
    post:
      tags: [Loans]
      summary: Get loan amortization schedule
      operationId: loans.schedule
      responses:
        '200':
          description: Schedule items

  /gateway#loans.makePayment:
    post:
      tags: [Loans]
      summary: Make a loan payment
      operationId: loans.makePayment
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                params:
                  type: object
                  required: [loanId, amountCents, fromAccountId]
                  properties:
                    loanId:
                      type: string
                    amountCents:
                      type: integer
                    fromAccountId:
                      type: string
                    extraPrincipalCents:
                      type: integer
      responses:
        '200':
          description: Payment result

  # ===========================================================================
  # WIRE TRANSFERS
  # ===========================================================================
  /gateway#wires.createDomestic:
    post:
      tags: [Wire Transfers]
      summary: Create domestic wire transfer
      operationId: wires.createDomestic
      responses:
        '200':
          description: Wire transfer created

  /gateway#wires.createInternational:
    post:
      tags: [Wire Transfers]
      summary: Create international wire transfer
      operationId: wires.createInternational
      responses:
        '200':
          description: Wire transfer created

  /gateway#wires.list:
    post:
      tags: [Wire Transfers]
      summary: List wire transfers
      operationId: wires.list
      responses:
        '200':
          description: Wire list

  /gateway#wires.fees:
    post:
      tags: [Wire Transfers]
      summary: Get wire transfer fees
      operationId: wires.fees
      responses:
        '200':
          description: Fee schedule

  /gateway#wires.limits:
    post:
      tags: [Wire Transfers]
      summary: Get wire transfer limits
      operationId: wires.limits
      responses:
        '200':
          description: Wire limits

  # ===========================================================================
  # STOP PAYMENTS
  # ===========================================================================
  /gateway#stopPayments.create:
    post:
      tags: [Stop Payments]
      summary: Create a stop payment
      operationId: stopPayments.create
      responses:
        '200':
          description: Stop payment created

  /gateway#stopPayments.list:
    post:
      tags: [Stop Payments]
      summary: List stop payments
      operationId: stopPayments.list
      responses:
        '200':
          description: Stop payment list

  /gateway#stopPayments.fee:
    post:
      tags: [Stop Payments]
      summary: Get stop payment fee
      operationId: stopPayments.fee
      responses:
        '200':
          description: Fee amount

  # ===========================================================================
  # P2P TRANSFERS
  # ===========================================================================
  /gateway#p2p.enroll:
    post:
      tags: [P2P]
      summary: Enroll in P2P transfers
      operationId: p2p.enroll
      responses:
        '200':
          description: Enrollment result

  /gateway#p2p.send:
    post:
      tags: [P2P]
      summary: Send P2P payment
      operationId: p2p.send
      responses:
        '200':
          description: Payment sent

  /gateway#p2p.request:
    post:
      tags: [P2P]
      summary: Request P2P payment
      operationId: p2p.request
      responses:
        '200':
          description: Request created

  /gateway#p2p.transactions:
    post:
      tags: [P2P]
      summary: List P2P transactions
      operationId: p2p.transactions
      responses:
        '200':
          description: Transaction list

  /gateway#p2p.limits:
    post:
      tags: [P2P]
      summary: Get P2P limits
      operationId: p2p.limits
      responses:
        '200':
          description: Limits

  # ===========================================================================
  # SAVINGS GOALS
  # ===========================================================================
  /gateway#goals.list:
    post:
      tags: [Savings Goals]
      summary: List savings goals
      operationId: goals.list
      responses:
        '200':
          description: Goals list

  /gateway#goals.create:
    post:
      tags: [Savings Goals]
      summary: Create a savings goal
      operationId: goals.create
      responses:
        '200':
          description: Created goal

  /gateway#goals.contribute:
    post:
      tags: [Savings Goals]
      summary: Contribute to a goal
      operationId: goals.contribute
      responses:
        '200':
          description: Contribution result

  /gateway#goals.summary:
    post:
      tags: [Savings Goals]
      summary: Get goals summary
      operationId: goals.summary
      responses:
        '200':
          description: Summary

  # ===========================================================================
  # DISPUTES
  # ===========================================================================
  /gateway#disputes.file:
    post:
      tags: [Disputes]
      summary: File a transaction dispute (Reg E)
      operationId: disputes.file
      responses:
        '200':
          description: Dispute filed

  /gateway#disputes.list:
    post:
      tags: [Disputes]
      summary: List disputes
      operationId: disputes.list
      responses:
        '200':
          description: Dispute list

  /gateway#disputes.get:
    post:
      tags: [Disputes]
      summary: Get dispute detail
      operationId: disputes.get
      responses:
        '200':
          description: Dispute detail

  # ===========================================================================
  # JOINT ACCOUNTS
  # ===========================================================================
  /gateway#jointAccounts.owners.list:
    post:
      tags: [Joint Accounts]
      summary: List joint account owners
      operationId: jointAccounts.owners.list
