  /gateway#kyc.evaluate:
    post:
      tags: [KYC]
      summary: Submit KYC identity evaluation
      operationId: kyc.evaluate
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                params:
                  type: object
                  required: [firstName, lastName, email, phone, dateOfBirth, ssn, address]
                  properties:
                    firstName:
                      type: string
                    lastName:
                      type: string
                    email:
                      type: string
                      format: email
                    phone:
                      type: string
                    dateOfBirth:
                      type: string
                      format: date
                    ssn:
                      type: string
                      description: Social Security Number (PII - encrypted in transit)
                    address:
                      type: object
                      required: [line1, city, state, zip]
                      properties:
                        line1:
                          type: string
                        line2:
                          type: string
                        city:
                          type: string
                        state:
                          type: string
                        zip:
                          type: string
      responses:
        '200':
          description: KYC evaluation result

  /gateway#kyc.status:
