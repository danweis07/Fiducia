# Container Image Scanning with Trivy
# Scans Docker images for OS and library vulnerabilities before deployment
#
# To activate: move this file to .github/workflows/container-scan.yml
#
name: Container Security Scan

on:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    # Advisory — base image CVEs should not block PRs
    continue-on-error: true

    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image for scanning
        run: |
          docker build \
            --build-arg VITE_SUPABASE_URL=https://placeholder.supabase.co \
            --build-arg VITE_SUPABASE_ANON_KEY=placeholder \
            --build-arg VITE_DEMO_MODE=true \
            -t banking-platform:scan-${{ github.sha }} \
            -f apps/web/Dockerfile \
            .

      - name: Run Trivy container scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: banking-platform:scan-${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: 0
          format: table

      - name: Upload Trivy SARIF results
        if: always()
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: banking-platform:scan-${{ github.sha }}
          format: sarif
          output: trivy-container-results.sarif

      - name: Upload to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-container-results.sarif
          category: trivy-container
