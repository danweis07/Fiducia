name: Mobile CI/CD

on:
  push:
    branches: [main]
    paths: ["mobile/**"]
  pull_request:
    branches: [main]
    paths: ["mobile/**"]
  workflow_dispatch:
    inputs:
      lane:
        description: "Fastlane lane to run"
        required: false
        default: "test"
        type: choice
        options:
          - test
          - beta
          - release
      platform:
        description: "Platform to build"
        required: false
        default: "both"
        type: choice
        options:
          - ios
          - android
          - both

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.16.0"
          channel: "stable"
          cache: true

      - run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Unit Tests
        run: flutter test --coverage

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flutter-coverage
          path: mobile/coverage/lcov.info

  build-android:
    name: Build Android
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.platform == 'android' || github.event.inputs.platform == 'both'))
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.16.0"
          channel: "stable"
          cache: true

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: mobile

      - run: flutter pub get

      - name: Build App Bundle
        run: >-
          flutter build appbundle --release
          --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: mobile/build/app/outputs/bundle/release/*.aab

      - name: Deploy to Play Store (beta)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.lane != 'test'
        working-directory: mobile/android
        env:
          PLAY_STORE_JSON_KEY: ${{ secrets.PLAY_STORE_JSON_KEY }}
          PACKAGE_NAME: ${{ secrets.ANDROID_PACKAGE_NAME }}
        run: bundle exec fastlane ${{ github.event.inputs.lane }}

  build-ios:
    name: Build iOS
    needs: lint-and-test
    runs-on: macos-latest
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'both'))
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.16.0"
          channel: "stable"
          cache: true

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: mobile

      - run: flutter pub get

      - name: Build iOS (no codesign)
        run: >-
          flutter build ios --release --no-codesign
          --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Deploy to TestFlight (beta)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.lane != 'test'
        working-directory: mobile/ios
        env:
          APP_IDENTIFIER: ${{ secrets.IOS_BUNDLE_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ITC_TEAM_ID: ${{ secrets.ITC_TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        run: bundle exec fastlane ${{ github.event.inputs.lane }}
