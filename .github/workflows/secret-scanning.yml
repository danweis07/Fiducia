# Secret Scanning with Gitleaks
# Detects accidentally committed secrets (API keys, tokens, passwords)
#
# To activate: move this file to .github/workflows/secret-scanning.yml
#
name: Secret Scanning

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    # Gitleaks v2 requires a paid GITLEAKS_LICENSE secret.
    # Run as advisory so missing license doesn't block PRs.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
