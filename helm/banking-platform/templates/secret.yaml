{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "banking-platform.fullname" . }}-secrets
  labels:
    {{- include "banking-platform.labels" . | nindent 4 }}
type: Opaque
data:
  supabase-service-key: {{ .Values.secrets.supabaseServiceKey | b64enc | quote }}
  sentry-dsn: {{ .Values.secrets.sentryDsn | b64enc | quote }}
{{- end }}
